<script>
        // === BOTÓN DE ACTUALIZAR CON LIMPIEZA DE CACHÉ ===
        document.getElementById('btn-actualizar').addEventListener('click', function(e) {
            // Añadir animación de rotación
            const icon = document.getElementById('icon-refresh');
            icon.classList.add('spinning');
            
            // Limpiar caché del navegador
            if ('caches' in window) {
                // Limpiar caché de Service Workers
                caches.keys().then(function(names) {
                    for (let name of names) {
                        caches.delete(name);
                    }
                });
            }
            
            // Forzar recarga con limpieza de caché
            location.reload(true);
            
            // Remover animación después de un tiempo (por si la recarga falla)
            setTimeout(function() {
                icon.classList.remove('spinning');
            }, 1000);
        });

        // === SCROLL REVEAL ===
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        // === CARGA Y GENERACIÓN DINÁMICA DE CATEGORÍAS ===
        async function cargarProductos() {
            try {
                const respuesta = await fetch('productos.json');
                
                if (!respuesta.ok) {
                    throw new Error(`Error ${respuesta.status}: No se pudo cargar el archivo productos.json`);
                }
                
                const datos = await respuesta.json();
                console.log('✅ Productos cargados correctamente:', datos);

                const menuContainer = document.getElementById('menu');
                menuContainer.innerHTML = ''; // Limpiar contenido

                // Definir nombres amigables para cada categoría
                const nombresAmigables = {
                    'pizzas con queso caribe': 'Pizzas con Queso Caribe',
                    'pizza con queso gouda': 'Pizza con Queso Gouda',
                    'espaguetis con queso caribe': 'Espaguetis con Queso Caribe',
                    'espaguetis con queso gouda': 'Espaguetis con Queso Gouda',
                    'platos completos': 'Platos Completos',
                    'para llevar': 'Para Llevar'
                };

                // Recorrer cada categoría del JSON
                Object.keys(datos).forEach((categoria, index) => {
                    const productos = datos[categoria];
                    
                    // Generar ID único para la sección
                    const sectionId = categoria.toLowerCase().replace(/ /g, '-');
                    
                    // Obtener nombre amigable o capitalizar
                    const nombreMostrar = nombresAmigables[categoria] || 
                        categoria.charAt(0).toUpperCase() + categoria.slice(1);

                    // Crear la sección
                    const section = document.createElement('section');
                    section.className = `reveal scroll-mt-32 ${index === 0 ? 'active' : ''}`;
                    section.id = sectionId;

                    // Título de la sección (sin icono)
                    const titulo = document.createElement('h3');
                    titulo.className = 'font-headline-sm text-headline-sm text-secondary mb-6';
                    titulo.textContent = nombreMostrar;

                    // Contenedor de imagen
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'rounded-2xl overflow-hidden mb-8 shadow-lg shadow-secondary/10';
                    
                    const img = document.createElement('img');
                    img.className = 'w-full h-64 object-cover';
                    img.alt = nombreMostrar;
                    
                    // Intentar cargar la imagen con el nombre de la categoría
                    const nombreArchivo = categoria + '.jpg';
                    img.src = nombreArchivo + '?v=' + new Date().getTime();
                    img.onerror = function() {
                        this.src = 'placeholder.jpg?v=' + new Date().getTime();
                    };
                    
                    imgContainer.appendChild(img);

                    // Lista de productos
                    const lista = document.createElement('ul');
                    lista.className = 'space-y-4';
                    lista.id = `${sectionId}-list`;

                    // Si no hay productos, mostrar mensaje
                    if (!productos || productos.length === 0) {
                        lista.innerHTML = `
                            <li class="text-secondary/50 text-center py-4">
                                No hay productos en esta categoría
                            </li>
                        `;
                    } else {
                        // Generar elementos de productos
                        productos.forEach((producto, idx) => {
                            const li = document.createElement('li');
                            const isLast = idx === productos.length - 1;
                            li.className = `flex justify-between items-baseline ${!isLast ? 'border-b border-secondary/20 pb-3' : 'pb-3'}`;
                            li.innerHTML = `
                                <span class="font-headline-sm text-[20px] text-secondary">${producto.nombre}</span>
                                <span class="font-bold text-secondary text-headline-sm ml-4">$${producto.precio}</span>
                            `;
                            lista.appendChild(li);
                        });
                    }

                    // Armar la sección
                    section.appendChild(titulo);
                    section.appendChild(imgContainer);
                    section.appendChild(lista);
                    menuContainer.appendChild(section);
                });

                // === SCROLL REVEAL ===
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

            } catch (error) {
                console.error('Error al cargar los productos:', error);
                const menuContainer = document.getElementById('menu');
                menuContainer.innerHTML = `
                    <div class="text-red-400 text-center py-8">
                        ⚠️ Error: ${error.message}
                        <p class="text-secondary/50 text-sm mt-2">
                            Asegúrate de que el archivo productos.json esté en la misma carpeta
                        </p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', cargarProductos);
    </script>
